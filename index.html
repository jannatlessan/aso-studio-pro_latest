    <script>
      // Safeguard against libraries attempting to overwrite the read-only window.fetch property
      (function() {
        const nativeFetch = window.fetch;
        if (nativeFetch) {
          Object.defineProperty(window, 'fetch', {
            enumerable: true,
            configurable: true,
            get: function() { return nativeFetch; },
            set: function() { 
              console.warn('A library attempted to overwrite window.fetch. This was prevented to avoid a TypeError.');
            }
          });
        }
      })();
    </script>
    <script>
      // Restore deep-link paths redirected by static-host 404 fallback.
      (function(l) {
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map(function(s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
