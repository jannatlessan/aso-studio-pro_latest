<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaad Dev Studio</title>
    <script>
      // Safeguard against libraries attempting to overwrite the read-only window.fetch property
      (function() {
        const nativeFetch = window.fetch;
        if (nativeFetch) {
          Object.defineProperty(window, 'fetch', {
            enumerable: true,
            configurable: true,
            get: function() { return nativeFetch; },
            set: function() { 
              console.warn('A library attempted to overwrite window.fetch. This was prevented to avoid a TypeError.');
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
